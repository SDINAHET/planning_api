<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BreizhCamp26 - Planning bénévoles</title>

  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=90">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
  </style>
  <link rel="stylesheet" href="/templates/assets/css/index.css">
</head>

<body>
  <main class="container">

    <section class="header">
      <button class="theme-btn" type="button" onclick="toggleTheme()" aria-label="Changer le thème">
        <i id="theme-icon" class="fa-regular fa-lightbulb"></i>
      </button>

      <h1>Planning <span class="brand-gradient">BreizhC@mp&nbsp;26</span></h1>
      <div class="person">Choisir un bénévole</div>
    </section>

    <section class="search-card">
      <div class="field">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="search"
          id="searchInput"
          placeholder="Rechercher un bénévole..."
          autocomplete="off">
      </div>

      <div class="field">
        <i class="fa-solid fa-user"></i>
        <select id="personSelect">
          <option value="">Choisir dans la liste...</option>
          {% for p in people %}
            <option value="/planning/{{ p | urlencode }}">{{ p }}</option>
          {% endfor %}
        </select>
      </div>
    </section>

    <section>
      <div class="section-title">
        <i class="fa-solid fa-list"></i>
        Liste des bénévoles
      </div>

      <div class="grid" id="peopleGrid">
        {% for p in people %}
          <a class="person-card"
             href="/planning/{{ p | urlencode }}"
             data-name="{{ p | lower }}">
            <span class="avatar">{{ p[0] }}</span>
            <span class="person-name">{{ p }}</span>
            <i class="fa-solid fa-chevron-right arrow"></i>
          </a>
        {% endfor %}
      </div>

      <div class="empty" id="noResult">
        <i class="fa-regular fa-calendar-xmark"></i>
        Aucun bénévole trouvé.
      </div>
    </section>

  </main>

  <script>
  </script>
  <script src="/templates/assets/js/index.js" defer></script>
</body>
</html>
