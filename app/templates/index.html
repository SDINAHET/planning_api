<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Planning bénévoles</title>

  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1e3a8a;
      --text: #000000;
      --muted: #475569;
      --border: #dbeafe;
      --bg: #ffffff;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      padding: 28px;
      margin-bottom: 22px;
      border-radius: 22px;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: var(--blue-dark);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      color: #000000;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .search-box {
      position: relative;
      margin: 22px 0 0;
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 15px 15px 15px 44px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      box-sizing: border-box;
      color: #000000;
      background: #ffffff;
    }

    #searchInput:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .person-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      padding: 16px;
      border-radius: 16px;
      text-decoration: none;
      color: #000000;
      border: 1px solid var(--border);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
      transition: 0.2s ease;
    }

    .avatar {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      background: #eff6ff;
      color: var(--blue-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .person-name {
      font-weight: 700;
    }

    .person-card:hover {
      background: var(--blue);
      color: #ffffff;
      border-color: var(--blue);
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.25);
    }

    .person-card:hover .avatar {
      background: #ffffff;
      color: var(--blue);
    }

    .no-result {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      color: #000000;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px 10px;
      }

      .header {
        padding: 18px;
        border-radius: 18px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 15px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .person-card {
        padding: 14px;
        border-radius: 14px;
      }

      .avatar {
        width: 38px;
        height: 38px;
        min-width: 38px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <span class="badge">Planning bénévoles BreizhC@mp-2026</span>
    <h1>Choisir une personne</h1>
    <p>Recherche par nom ou prénom, puis clique pour afficher le planning personnel.</p>

    <div class="search-box">
      <span class="search-icon">🔎</span>
      <input
        type="search"
        id="searchInput"
        placeholder="Rechercher par nom ou prénom..."
        autocomplete="off"
      >
    </div>
  </header>

  <main>
    <div class="grid" id="peopleGrid">
      {% for p in people %}
        <a class="person-card"
           href="/planning/{{ p | urlencode }}"
           data-name="{{ p | lower }}">
          <span class="avatar">{{ p[0] }}</span>
          <span class="person-name">{{ p }}</span>
        </a>
      {% endfor %}
    </div>

    <p class="no-result" id="noResult">Aucune personne trouvée.</p>
  </main>

  <script>
    const searchInput = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".person-card");
    const noResult = document.getElementById("noResult");

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    searchInput.addEventListener("input", () => {
      const query = normalizeText(searchInput.value.trim());
      let visibleCount = 0;

      cards.forEach(card => {
        const name = normalizeText(card.dataset.name);

        if (name.includes(query)) {
          card.style.display = "flex";
          visibleCount++;
        } else {
          card.style.display = "none";
        }
      });

      noResult.style.display = visibleCount === 0 ? "block" : "none";
    });
  </script>
</body>
</html>
