<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BreizhCamp26 - Planning bénévoles</title>

  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=90">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e5e7eb;
      --dark:#0f172a;
      --blue:#2563eb;
      --orange:#ea7a1f;
      --green:#22c55e;
      --shadow:0 10px 28px rgba(15,23,42,.10);
    }

    html[data-theme="dark"] {
      --bg:#0f172a;
      --card:#1e293b;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --border:#334155;
      --dark:#020617;
      --shadow:0 10px 28px rgba(0,0,0,.35);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container {
      width:100%;
      max-width:900px;
      margin:auto;
      padding:8px;
    }

    .header {
      position:sticky;
      top:0;
      z-index:50;
      background:var(--card);
      padding:14px 48px 14px 12px;
      border-radius:0 0 22px 22px;
      box-shadow:var(--shadow);
      text-align:center;
      margin-bottom:12px;
    }

    h1 {
      margin:0;
      font-size:clamp(1.05rem,4.4vw,2rem);
      line-height:1.05;
      white-space:nowrap;
    }

    .brand-gradient {
      background:linear-gradient(90deg,#2563eb,#22c55e,#ea7a1f);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      font-weight:900;
    }

    .subtitle {
      margin-top:8px;
      color:var(--orange);
      font-size:clamp(1rem,4vw,1.35rem);
      font-weight:900;
    }
    .person {
      margin-top:8px;
      color:#f97316;
      font-size:clamp(1rem,4vw,1.45rem);
      font-weight:900;
      text-shadow:0 1px 2px rgba(0,0,0,.25);
      }

      html[data-theme="light"] .person {
        color:#1e3a8a;
        text-shadow:none;
      }

    .theme-btn {
      position:absolute;
      right:12px;
      top:12px;
      width:36px;
      height:36px;
      border:1px solid var(--border);
      border-radius:50%;
      background:var(--card);
      color:var(--text);
      cursor:pointer;
    }

    .actions {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-bottom:12px;
    }

    .btn {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      min-height:40px;
      padding:8px;
      border-radius:13px;
      text-decoration:none;
      font-weight:900;
      color:#fff;
      background:var(--blue);
      font-size:.85rem;
      box-shadow:0 8px 18px rgba(37,99,235,.25);
    }

    .btn-secondary {
      background:#64748b;
    }

    .search-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:12px;
      margin-bottom:12px;
    }

    .field {
      position:relative;
      margin-bottom:8px;
    }

    .field:last-child {
      margin-bottom:0;
    }

    .field i {
      position:absolute;
      left:13px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
    }

    input,
    select {
      width:100%;
      padding:12px 12px 12px 40px;
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--card);
      color:var(--text);
      font-size:.95rem;
      font-weight:800;
    }

    input:focus,
    select:focus {
      outline:none;
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,.18);
    }

    .section-title {
      display:flex;
      align-items:center;
      gap:8px;
      margin:14px 4px 10px;
      font-size:1.05rem;
      font-weight:900;
    }

    .section-title i {
      color:var(--orange);
    }

    .grid {
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .person-card {
      display:flex;
      align-items:center;
      gap:12px;
      min-height:62px;
      padding:10px;
      border-radius:18px;
      background:var(--card);
      border:1px solid var(--border);
      color:var(--text);
      text-decoration:none;
      box-shadow:var(--shadow);
      transition:.18s;
    }

    .person-card:hover {
      transform:translateY(-2px);
      border-color:var(--blue);
    }

    .avatar {
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--dark);
      color:#fff;
      font-weight:900;
      font-size:1rem;
    }

    .person-name {
      flex:1;
      font-weight:900;
      overflow-wrap:anywhere;
    }

    .arrow {
      color:var(--orange);
    }

    .empty {
      display:none;
      padding:16px;
      text-align:center;
      color:var(--muted);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      font-weight:900;
    }

    .brand-gradient {
      background:linear-gradient(90deg,#93328e,#e8e83f,#ea7a1f);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      font-weight:900;
    }

    @media (min-width:650px) {
      body { padding:10px; }

      .header {
        border-radius:22px;
      }

      .btn {
        min-height:44px;
        font-size:.95rem;
      }

      .grid {
        grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
        gap:12px;
      }

      .person-card {
        min-height:70px;
        padding:14px;
      }


    }
  </style>
</head>

<body>
  <main class="container">

    <section class="header">
      <button class="theme-btn" type="button" onclick="toggleTheme()" aria-label="Changer le thème">
        <i id="theme-icon" class="fa-regular fa-lightbulb"></i>
      </button>

      <h1>Planning <span class="brand-gradient">BreizhC@mp&nbsp;26</span></h1>
      <div class="person">Choisir un bénévole</div>
    </section>

    <section class="search-card">
      <div class="field">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="search"
          id="searchInput"
          placeholder="Rechercher un bénévole..."
          autocomplete="off">
      </div>

      <div class="field">
        <i class="fa-solid fa-user"></i>
        <select id="personSelect">
          <option value="">Choisir dans la liste...</option>
          {% for p in people %}
            <option value="/planning/{{ p | urlencode }}">{{ p }}</option>
          {% endfor %}
        </select>
      </div>
    </section>

    <section>
      <div class="section-title">
        <i class="fa-solid fa-list"></i>
        Liste des bénévoles
      </div>

      <div class="grid" id="peopleGrid">
        {% for p in people %}
          <a class="person-card"
             href="/planning/{{ p | urlencode }}"
             data-name="{{ p | lower }}">
            <span class="avatar">{{ p[0] }}</span>
            <span class="person-name">{{ p }}</span>
            <i class="fa-solid fa-chevron-right arrow"></i>
          </a>
        {% endfor %}
      </div>

      <div class="empty" id="noResult">
        <i class="fa-regular fa-calendar-xmark"></i>
        Aucun bénévole trouvé.
      </div>
    </section>

  </main>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById("theme-icon");
      const next = html.dataset.theme === "dark" ? "light" : "dark";

      html.dataset.theme = next;
      localStorage.setItem("theme", next);

      icon.className = next === "dark"
        ? "fa-regular fa-lightbulb"
        : "fa-regular fa-moon";
    }

    function initTheme() {
      const saved = localStorage.getItem("theme") || "dark";
      const icon = document.getElementById("theme-icon");

      document.documentElement.dataset.theme = saved;

      icon.className = saved === "dark"
        ? "fa-regular fa-lightbulb"
        : "fa-regular fa-moon";
    }

    const searchInput = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".person-card");
    const noResult = document.getElementById("noResult");
    const personSelect = document.getElementById("personSelect");

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    searchInput.addEventListener("input", () => {
      const query = normalizeText(searchInput.value.trim());
      let visibleCount = 0;

      cards.forEach(card => {
        const name = normalizeText(card.dataset.name);

        if (name.includes(query)) {
          card.style.display = "flex";
          visibleCount++;
        } else {
          card.style.display = "none";
        }
      });

      noResult.style.display = visibleCount === 0 ? "block" : "none";
    });

    personSelect.addEventListener("change", () => {
      if (personSelect.value) {
        window.location.href = personSelect.value;
      }
    });

    initTheme();
  </script>
</body>
</html>
